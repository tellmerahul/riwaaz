  <style>
    .coming-soon__content {
      max-width: 720px;
    }
    .coming-soon__headline-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 0 12px;
      margin-bottom: 0;
    }
    .coming-soon__headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.15rem, 3.5vw, 2.5rem);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: 0.01em;
      margin: 0;
      color: #ffffff;
      white-space: nowrap;
      text-align: center;
    }
    .coming-soon__headline em {
      font-style: italic;
      color: #f5ad18;
      font-weight: 500;
    }
    .coming-soon__divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 10px auto 26px;
      width: min(260px, 72vw);
    }
    .coming-soon__divider::before,
    .coming-soon__divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(245, 173, 24, 0.65);
    }
    .coming-soon__divider span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #f5ad18;
      flex-shrink: 0;
    }
    .coming-soon__style {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.25rem, 3.5vw, 1.85rem);
      font-weight: 500;
      line-height: 1.3;
      color: #ffffff;
      white-space: nowrap;
      margin: 0 0 10px;
    }
    .coming-soon__desc-line {
      white-space: nowrap;
      font-size: clamp(0.8rem, 2.4vw, 1rem);
      margin-bottom: 16px;
    }
    .coming-soon__soon {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.5rem, 4.5vw, 2.5rem);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: 0.01em;
      color: #ffffff;
      margin-bottom: 36px;
    }
    .coming-soon__soon em {
      font-style: italic;
      color: #f5ad18;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="coming-soon">
    <div class="coming-soon__glow coming-soon__glow--1" aria-hidden="true"></div>
    <div class="coming-soon__glow coming-soon__glow--2" aria-hidden="true"></div>

    <main class="coming-soon__content">
      <img src="logo-new.png" alt="My Fit Riwaaz" class="coming-soon__logo" width="280" height="auto" />

      <div class="coming-soon__headline-wrap">
        <h1 class="coming-soon__headline">Something <em>beautiful</em> is on its way.</h1>
      </div>
      <div class="coming-soon__divider" aria-hidden="true"><span></span></div>
      <div class="coming-soon__headline-wrap">
        <p class="coming-soon__style">Style Is Personal.</p>
      </div>
      <p class="coming-soon__desc coming-soon__desc-line">We are building something that helps you discover yours.</p>
      <h2 class="coming-soon__soon">Coming <em>Soon</em></h2>

      <form class="coming-soon__form" id="notify-form">
        <label for="email" class="visually-hidden">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          autocomplete="email"
        />
        <button type="submit">Notify Me</button>
      </form>
      <p class="coming-soon__form-msg" id="form-msg" hidden>Thanks — we&rsquo;ll be in touch soon.</p>
      <p class="coming-soon__form-error" id="form-error" hidden>Something went wrong. Please try again.</p>

      <div class="coming-soon__social">
        <a href="#" aria-label="Instagram">Instagram</a>
        <span aria-hidden="true">·</span>
        <a href="#" aria-label="Facebook">Facebook</a>
        <span aria-hidden="true">·</span>
        <a href="mailto:hello@myfitriwaaz.com">hello@myfitriwaaz.com</a>
      </div>
    </main>

    <footer class="coming-soon__footer">
      <p>&copy; 2026 My Fit Riwaaz. All rights reserved.</p>
    </footer>
  </div>

  <script src="coming-soon.js"></script>
</body>
