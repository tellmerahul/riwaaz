  <link rel="icon" href="logo-new.png" type="image/png" />
  <link rel="apple-touch-icon" href="logo-new.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="coming-soon.css" />
  <style>
    .coming-soon__headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.75rem, 8vw, 4.25rem);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: 0.01em;
      margin-bottom: 18px;
      color: #ffffff;
    }
    .coming-soon__headline em {
      font-style: italic;
      color: #f5ad18;
      font-weight: 500;
    }
    .coming-soon__divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 0 auto 28px;
      width: min(220px, 60vw);
    }
    .coming-soon__divider::before,
    .coming-soon__divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(245, 173, 24, 0.45);
    }
    .coming-soon__divider span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #f5ad18;
      flex-shrink: 0;
    }
    .coming-soon__tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.35rem, 3.5vw, 1.75rem);
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 18px;
    }
    .coming-soon__tagline em {
      font-style: italic;
      color: #f5ad18;
    }
  </style>
</head>
<body>
  <div class="coming-soon">
    <div class="coming-soon__glow coming-soon__glow--1" aria-hidden="true"></div>
    <div class="coming-soon__glow coming-soon__glow--2" aria-hidden="true"></div>

    <main class="coming-soon__content">
      <img src="logo-new.png" alt="My Fit Riwaaz" class="coming-soon__logo" width="280" height="auto" />

      <h1 class="coming-soon__headline">Coming <em>Soon</em></h1>
      <div class="coming-soon__divider" aria-hidden="true"><span></span></div>
      <p class="coming-soon__tagline">Something <em>beautiful</em> is on its way.</p>
      <p class="coming-soon__desc">
        Style Is Personal. We are building something that helps you discover yours.
      </p>

      <form class="coming-soon__form" id="notify-form">
        <label for="email" class="visually-hidden">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          autocomplete="email"
        />
        <button type="submit">Notify Me</button>
      </form>
      <p class="coming-soon__form-msg" id="form-msg" hidden>Thanks — we&rsquo;ll be in touch soon.</p>

      <div class="coming-soon__social">
        <a href="#" aria-label="Instagram">Instagram</a>
        <span aria-hidden="true">·</span>
        <a href="#" aria-label="Facebook">Facebook</a>
        <span aria-hidden="true">·</span>
        <a href="mailto:hello@myfitriwaaz.com">hello@myfitriwaaz.com</a>
      </div>
    </main>

    <footer class="coming-soon__footer">
      <p>&copy; 2026 My Fit Riwaaz. All rights reserved.</p>
    </footer>
  </div>

  <script src="coming-soon.js"></script>
</body>
</html>
